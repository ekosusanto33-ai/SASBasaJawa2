<!DOCTYPE html>
<html lang="jv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USP Basa Jawa 2026 - Google Sites Version</title>
    <!-- Tailwind CSS untuk Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel untuk menjalankan JSX di Browser -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-chat { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <!-- Inisialisasi Firebase secara terpisah sebagai Module untuk menghindari error require -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        // Konfigurasi Environment
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Ekspos ke window agar bisa diakses oleh script Babel/React
        window.firebaseStore = { db, auth, collection, addDoc, signInAnonymously, onAuthStateChanged };
        window.appId = typeof __app_id !== 'undefined' ? __app_id : 'ujian-basa-jawa-v1';
        window.geminiKey = ""; 
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [user, setUser] = useState(null);
            const [step, setStep] = useState('start');
            const [userData, setUserData] = useState({ name: '', presensi: '', date: new Date().toISOString().split('T')[0] });
            const [answers, setAnswers] = useState({});
            const [score, setScore] = useState(0);
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [aiAnalysis, setAiAnalysis] = useState("");
            const [isChatOpen, setIsChatOpen] = useState(false);
            const [chatInput, setChatInput] = useState("");
            const [chatMessages, setChatMessages] = useState([
                { role: 'assistant', text: 'Sugeng rawuh! Aku Guru AI Basa Jawa. Ana sing pengen ditakokake?' }
            ]);

            const chatEndRef = useRef(null);

            useEffect(() => {
                // Menunggu Firebase siap di window
                const checkFirebase = setInterval(() => {
                    if (window.firebaseStore) {
                        clearInterval(checkFirebase);
                        const { auth, signInAnonymously, onAuthStateChanged } = window.firebaseStore;
                        
                        signInAnonymously(auth).catch(e => console.error("Auth Error:", e));
                        onAuthStateChanged(auth, (u) => setUser(u));
                    }
                }, 100);
                return () => clearInterval(checkFirebase);
            }, []);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [chatMessages]);

            const quizData = [
                { id: 1, type: 'pg', question: 'Bapak pucung renteng-renteng kaya kalung, Dawa kaya ula, Pencokanmu wesi miring, Sing disaba si pucung mung turut kutha. Batangane yaiku...', options: ['Sepur', 'Gajah', 'Ula', 'Rantai'], correct: 'Sepur', points: 10 },
                { id: 2, type: 'pg', question: 'Teks sing nggambarake swasana lan kahanan kanthi cetha diarani teks...', options: ['Narasi', 'Deskripsi', 'Eksposisi', 'Argumentasi'], correct: 'Deskripsi', points: 10 },
                { id: 3, type: 'isian', question: 'Cangkriman "nasgithel" tegese panas, legi, lan...', correct: 'kenthel', points: 20 },
                { id: 4, type: 'pgk', question: 'Watake Roro Jonggrang nalika menehi syarat marang Bandung Bondowoso yaiku...', options: ['Cerdhek', 'Licik', 'Sabar', 'Gumedhe'], correct: ['Cerdhek', 'Licik'], points: 30 },
                { id: 5, type: 'match', question: 'Pasangno Cangkriman iki!', pairs: [{ left: 'Pitik walik saba kebon', right: 'Nanas' }, { left: 'Sega sekepel dirubung semut', right: 'Salak' }], points: 30 }
            ];

            const callGemini = async (payload, systemPrompt) => {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${window.geminiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: payload }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "Nyuwun sewu, AI mboten saged mangsuli.";
                } catch (e) {
                    return "Gangguan koneksi AI.";
                }
            };

            const handleSubmit = async () => {
                let totalScore = 0;
                quizData.forEach(q => {
                    const ans = answers[q.id];
                    if (q.type === 'pg' || q.type === 'isian') {
                        if (ans?.toLowerCase().trim() === q.correct.toLowerCase()) totalScore += q.points;
                    } else if (q.type === 'pgk') {
                        if (ans?.length === q.correct.length && ans.every(v => q.correct.includes(v))) totalScore += q.points;
                    } else if (q.type === 'match' && ans === 'correct') {
                        totalScore += q.points;
                    }
                });
                
                setScore(totalScore);
                setStep('result');
                
                if (user && window.firebaseStore) {
                    setIsSaving(true);
                    const { db, collection, addDoc } = window.firebaseStore;
                    try {
                        await addDoc(collection(db, 'artifacts', window.appId, 'public', 'data', 'submissions'), {
                            name: userData.name,
                            score: totalScore,
                            timestamp: new Date().toISOString()
                        });
                    } catch (err) {
                        console.error("Save error:", err);
                    }
                    setIsSaving(false);
                }

                setIsAiLoading(true);
                const analysis = await callGemini(`Siswa ${userData.name} dapat nilai ${totalScore}/100. Berikan analisis dalam bahasa jawa krama alus.`, "Anda Guru Basa Jawa yang bijak.");
                setAiAnalysis(analysis);
                setIsAiLoading(false);
            };

            const handleChat = async () => {
                if (!chatInput.trim()) return;
                const msg = chatInput;
                setChatInput("");
                setChatMessages(prev => [...prev, { role: 'user', text: msg }]);
                const res = await callGemini(msg, "Anda Guru Basa Jawa yang membantu siswa mengerjakan latihan.");
                setChatMessages(prev => [...prev, { role: 'assistant', text: res }]);
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-2xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-200">
                        <header className="bg-indigo-700 p-8 text-white text-center">
                            <h1 className="text-3xl font-bold tracking-tight">USP BASA JAWA 2026</h1>
                            <p className="opacity-80 mt-2 font-medium">Ujian Satuan Pendidikan - Paket C</p>
                        </header>

                        <div className="p-6 md:p-10">
                            {step === 'start' && (
                                <div className="text-center py-12 space-y-6">
                                    <div className="w-20 h-20 bg-indigo-50 rounded-2xl flex items-center justify-center mx-auto text-indigo-600">
                                        <i data-lucide="book-open" className="w-10 h-10"></i>
                                    </div>
                                    <h2 className="text-2xl font-bold">Sugeng Rawuh!</h2>
                                    <p className="text-slate-500">Ayo nggarap ujian iki kanthi jujur lan teliti.</p>
                                    <button onClick={() => setStep('identity')} className="w-full max-w-xs bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-200">Mulai Ujian</button>
                                </div>
                            )}

                            {step === 'identity' && (
                                <form onSubmit={(e) => { e.preventDefault(); setStep('quiz'); }} className="space-y-5">
                                    <h3 className="text-xl font-bold text-slate-800">Identitas Siswa</h3>
                                    <input required type="text" placeholder="Jeneng Lengkap" className="w-full p-4 rounded-xl border border-slate-200 bg-slate-50 outline-none focus:ring-2 focus:ring-indigo-500 transition-all" value={userData.name} onChange={e => setUserData({...userData, name: e.target.value})} />
                                    <input required type="number" placeholder="Nomer Presensi" className="w-full p-4 rounded-xl border border-slate-200 bg-slate-50 outline-none focus:ring-2 focus:ring-indigo-500 transition-all" value={userData.presensi} onChange={e => setUserData({...userData, presensi: e.target.value})} />
                                    <button type="submit" className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-200">Mlebu Soal</button>
                                </form>
                            )}

                            {step === 'quiz' && (
                                <div className="space-y-10">
                                    <div className="flex justify-between items-center sticky top-0 bg-white/80 backdrop-blur-md py-4 z-10 border-b border-slate-100 mb-4">
                                        <span className="font-bold text-indigo-600">{userData.name}</span>
                                        <span className="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-sm font-bold">{Object.keys(answers).length} / {quizData.length}</span>
                                    </div>
                                    {quizData.map((q, idx) => (
                                        <div key={q.id} className="space-y-4">
                                            <div className="flex gap-4">
                                                <span className="bg-indigo-600 text-white w-8 h-8 rounded-lg flex items-center justify-center font-bold flex-shrink-0">{idx + 1}</span>
                                                <p className="text-lg font-bold text-slate-800">{q.question}</p>
                                            </div>
                                            {q.type === 'pg' && (
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3 ml-12">
                                                    {q.options.map(opt => (
                                                        <button key={opt} onClick={() => setAnswers({...answers, [q.id]: opt})} className={`p-4 text-left rounded-xl border-2 transition-all ${answers[q.id] === opt ? 'border-indigo-600 bg-indigo-50 text-indigo-700 font-bold' : 'border-slate-100 bg-slate-50 hover:border-slate-300'}`}>{opt}</button>
                                                    ))}
                                                </div>
                                            )}
                                            {q.type === 'isian' && (
                                                <div className="ml-12"><input type="text" className="w-full p-4 rounded-xl border border-slate-200 bg-slate-50 outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Jawaban sampeyan..." onChange={(e) => setAnswers({...answers, [q.id]: e.target.value})} /></div>
                                            )}
                                            {q.type === 'pgk' && (
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3 ml-12">
                                                    {q.options.map(opt => (
                                                        <button key={opt} onClick={() => {
                                                            const curr = answers[q.id] || [];
                                                            setAnswers({...answers, [q.id]: curr.includes(opt) ? curr.filter(o => o !== opt) : [...curr, opt]});
                                                        }} className={`p-4 text-left rounded-xl border-2 flex items-center gap-3 ${(answers[q.id] || []).includes(opt) ? 'border-indigo-600 bg-indigo-50 text-indigo-700 font-bold' : 'border-slate-100 bg-slate-50'}`}>
                                                            <div className={`w-5 h-5 rounded border-2 ${(answers[q.id] || []).includes(opt) ? 'bg-indigo-600 border-indigo-600' : 'bg-white border-slate-300'}`} /> {opt}
                                                        </button>
                                                    ))}
                                                </div>
                                            )}
                                            {q.type === 'match' && (
                                                <div className="ml-12 space-y-2">
                                                    {q.pairs.map((pair, pIdx) => (
                                                        <div key={pIdx} className="flex items-center gap-2">
                                                            <div className="bg-slate-50 p-2 border rounded-lg text-sm flex-1">{pair.left}</div>
                                                            <span>➔</span>
                                                            <select className="p-2 border rounded-lg text-sm flex-1" onChange={(e) => {
                                                                const isCorrect = e.target.value === pair.right;
                                                                setAnswers({...answers, [q.id]: isCorrect ? 'correct' : 'wrong'});
                                                            }}>
                                                                <option value="">Pilih...</option>
                                                                {q.pairs.map(p => <option key={p.right} value={p.right}>{p.right}</option>)}
                                                            </select>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                    <button onClick={handleSubmit} className="w-full bg-green-600 text-white py-5 rounded-2xl font-bold text-xl hover:bg-green-700 transition-all shadow-xl shadow-green-100">Kirim Wangsulan</button>
                                </div>
                            )}

                            {step === 'result' && (
                                <div className="text-center space-y-8 py-6">
                                    <div className="w-40 h-40 bg-indigo-600 rounded-full flex flex-col items-center justify-center mx-auto text-white shadow-2xl border-8 border-indigo-50">
                                        <span className="text-xs font-bold uppercase tracking-widest opacity-70">BIJI</span>
                                        <span className="text-6xl font-black">{score}</span>
                                    </div>
                                    <div className="bg-indigo-50 p-6 rounded-3xl text-left border border-indigo-100 relative overflow-hidden">
                                        <h4 className="font-bold text-indigo-800 flex items-center gap-2 mb-3">
                                            <i data-lucide="sparkles" className="w-5 h-5"></i> Analisis Guru AI
                                        </h4>
                                        {isAiLoading ? <p className="text-indigo-400 italic">Saweg nganalisis...</p> : <p className="text-slate-700 whitespace-pre-wrap">{aiAnalysis}</p>}
                                    </div>
                                    <button onClick={() => window.location.reload()} className="w-full bg-slate-100 text-slate-600 py-4 rounded-2xl font-bold hover:bg-slate-200 transition-all">Baleni Ujian</button>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Chat AI */}
                    {step === 'quiz' && (
                        <div className="fixed bottom-6 right-6 z-50">
                            {!isChatOpen ? (
                                <button onClick={() => setIsChatOpen(true)} className="bg-indigo-600 text-white p-4 rounded-full shadow-2xl hover:scale-110 transition-all">
                                    <i data-lucide="message-circle" className="w-6 h-6"></i>
                                </button>
                            ) : (
                                <div className="glass-chat w-80 h-[450px] rounded-3xl shadow-2xl border border-slate-200 flex flex-col animate-in slide-in-from-bottom-10 duration-300">
                                    <div className="bg-indigo-600 p-4 text-white flex justify-between items-center rounded-t-3xl">
                                        <span className="font-bold flex items-center gap-2"><i data-lucide="sparkles" className="w-4 h-4"></i> Guru AI</span>
                                        <button onClick={() => setIsChatOpen(false)}><i data-lucide="x" className="w-5 h-5"></i></button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50/50">
                                        {chatMessages.map((msg, i) => (
                                            <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                                <div className={`max-w-[85%] p-3 rounded-2xl text-sm ${msg.role === 'user' ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-white shadow-sm border text-slate-700 rounded-tl-none'}`}>
                                                    {msg.text}
                                                </div>
                                            </div>
                                        ))}
                                        <div ref={chatEndRef} />
                                    </div>
                                    <div className="p-3 bg-white flex gap-2 rounded-b-3xl border-t">
                                        <input type="text" value={chatInput} onChange={e => setChatInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleChat()} placeholder="Tanya sesuatu..." className="flex-1 bg-slate-100 p-3 rounded-xl text-sm outline-none" />
                                        <button onClick={handleChat} className="bg-indigo-600 text-white p-3 rounded-xl"><i data-lucide="send" className="w-4 h-4"></i></button>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // Render icons
        setTimeout(() => lucide.createIcons(), 1000);
    </script>
</body>
</html>
